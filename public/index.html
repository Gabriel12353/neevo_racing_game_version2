<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>neevo racing game</title>
  <link rel="stylesheet" href="style.css?v=16" />
</head>
<body class="leaderboard-page">
  <div class="leaderboard-page-wrap">
    <div class="leaderboard-page-header">
      <img src="NeevoLogo.png" alt="Neevo" class="leaderboard-page-logo" />

      <p class="leaderboard-page-subtitle">public page</p>
