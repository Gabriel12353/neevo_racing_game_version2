<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>neevo controller</title>
  <link rel="stylesheet" href="style.css?v=23" />
</head>
<body class="controller-page">
  <div class="controller-shell">
    <header class="controller-header">
      <img src="NeevoLogo.png" alt="Neevo" class="controller-logo" />
      <div class="controller-role" id="controllerRoleLabel">player</div>
      <div class="controller-status-pill" id="controllerStatus">enter your name</div>
    </header>

    <section class="controller-card join-card" id="joinCard">
      <h1 class="controller-title">join race</h1>

      <label class="controller-label" for="playerName">name</label>
      <input id="playerName" class="controller-input" type="text" maxlength="20" placeholder="enter name" />

      <div id="emailRow" class="email-row hidden">
        <label class="controller-label" for="playerEmail">email optional</label>
        <input id="playerEmail" class="controller-input" type="email" maxlength="60" placeholder="enter email optional" />
      </div>

      <button id="confirmNameBtn" class="controller-main-btn">confirm</button>
    </section>

    <section class="controller-card builder-card" id="builderCard">
      <div class="build-heading-wrap">
        <h2 class="controller-subtitle">build your car</h2>
        <p class="build-note" id="buildNote">choose your parts, then press ready</p>
      </div>

      <div class="selector-stack">
        <div class="selector-card">
          <div class="selector-top">
            <div class="selector-title">front wing</div>
            <div class="selector-stats" id="frontStats">0.0g • Cd 0.000</div>
          </div>

          <div class="selector-row">
            <button id="frontPrevBtn" class="selector-arrow-btn" type="button" aria-label="previous front wing">‹</button>

            <div class="selector-preview">
              <img id="frontPreview" class="selector-preview-image" alt="front wing preview" />
              <div id="frontName" class="selector-name">front wing</div>
            </div>

            <button id="frontNextBtn" class="selector-arrow-btn" type="button" aria-label="next front wing">›</button>
          </div>
        </div>

        <div class="selector-card">
          <div class="selector-top">
            <div class="selector-title">body</div>
            <div class="selector-stats" id="bodyStats">0.0g • Cd 0.000</div>
          </div>

          <div class="selector-row">
            <button id="bodyPrevBtn" class="selector-arrow-btn" type="button" aria-label="previous body">‹</button>

            <div class="selector-preview">
              <img id="bodyPreview" class="selector-preview-image" alt="body preview" />
              <div id="bodyName" class="selector-name">body</div>
            </div>

            <button id="bodyNextBtn" class="selector-arrow-btn" type="button" aria-label="next body">›</button>
          </div>
        </div>

        <div class="selector-card">
          <div class="selector-top">
            <div class="selector-title">rear wing</div>
            <div class="selector-stats" id="rearStats">0.0g • Cd 0.000</div>
          </div>

          <div class="selector-row">
            <button id="rearPrevBtn" class="selector-arrow-btn" type="button" aria-label="previous rear wing">‹</button>

            <div class="selector-preview">
              <img id="rearPreview" class="selector-preview-image" alt="rear wing preview" />
              <div id="rearName" class="selector-name">rear wing</div>
            </div>

            <button id="rearNextBtn" class="selector-arrow-btn" type="button" aria-label="next rear wing">›</button>
          </div>
        </div>
      </div>

      <div class="build-summary-card">
        <div class="build-summary-line">
          <span>total mass</span>
          <strong id="totalMassValue">0.0g</strong>
        </div>
        <div class="build-summary-line">
          <span>total Cd</span>
          <strong id="totalCdValue">0.000</strong>
        </div>
      </div>

      <div class="builder-buttons">
        <button id="readyBtn" class="controller-main-btn" type="button">ready</button>
        <button id="editBuildBtn" class="controller-secondary-btn" type="button">change build</button>
      </div>
    </section>

    <section class="controller-card tap-card" id="tapCard">
      <div class="tap-label">reaction</div>
      <div class="tap-help" id="tapHelpText">wait for the lights</div>

      <button id="tapButton" class="big-tap-btn" type="button">
        <span id="tapButtonText">WAIT</span>
      </button>

      <div class="tap-readout" id="tapReadout">reaction: waiting</div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="controller.js?v=23"></script>
</body>
</html>
